<svg xmlns="http://www.w3.org/2000/svg" viewBox="178 210 144 144">
  <defs>
    <!-- Star point gradients -->
    <linearGradient id="ptDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#06111f"/>
      <stop offset="100%" stop-color="#0d2d6e"/>
    </linearGradient>
    <linearGradient id="ptMid" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1555a8" stop-opacity="0.92"/>
      <stop offset="100%" stop-color="#2874c8" stop-opacity="0.84"/>
    </linearGradient>
    <linearGradient id="ptLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#5aaae0" stop-opacity="0.88"/>
      <stop offset="100%" stop-color="#b0d8f5" stop-opacity="0.72"/>
    </linearGradient>
    <linearGradient id="ptLightNW" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%"   stop-color="#2874c8" stop-opacity="0.74"/>
      <stop offset="100%" stop-color="#d0ecf8" stop-opacity="0.92"/>
    </linearGradient>

    <!-- Center glass disc gradients -->
    <radialGradient id="glassFill" cx="36%" cy="30%" r="70%">
      <stop offset="0%"   stop-color="#ffffff"  stop-opacity="1.00"/>
      <stop offset="14%"  stop-color="#d0ecf8"  stop-opacity="0.97"/>
      <stop offset="44%"  stop-color="#2874c8"  stop-opacity="0.90"/>
      <stop offset="78%"  stop-color="#0d2d6e"  stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#06111f"  stop-opacity="1.00"/>
    </radialGradient>
    <linearGradient id="skyBand" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#d0ecf8" stop-opacity="0.60"/>
      <stop offset="55%"  stop-color="#5aaae0" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#5aaae0" stop-opacity="0.00"/>
    </linearGradient>
    <radialGradient id="specMain" cx="30%" cy="26%" r="52%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.97"/>
      <stop offset="36%"  stop-color="#ffffff" stop-opacity="0.24"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.00"/>
    </radialGradient>
    <radialGradient id="specHot" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.92"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.00"/>
    </radialGradient>
    <radialGradient id="transmission" cx="64%" cy="68%" r="44%">
      <stop offset="0%"   stop-color="#5aaae0" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#5aaae0" stop-opacity="0.00"/>
    </radialGradient>
    <linearGradient id="rimGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#b0d8f5"/>
      <stop offset="25%"  stop-color="#ffffff"/>
      <stop offset="65%"  stop-color="#2874c8"/>
      <stop offset="100%" stop-color="#06111f"/>
    </linearGradient>

    <!-- W monogram glow -->
    <filter id="wGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Star group (same transform as the original logo) -->
  <g transform="translate(250, 282) scale(0.55) translate(-250, -170)">
    <!-- NORTH -->
    <polygon points="250,170  239,149  250,50"  fill="url(#ptDark)"/>
    <polygon points="250,170  261,149  250,50"  fill="url(#ptLight)"/>
    <!-- SOUTH -->
    <polygon points="250,170  261,191  250,290" fill="url(#ptMid)"/>
    <polygon points="250,170  239,191  250,290" fill="url(#ptLight)"/>
    <!-- EAST -->
    <polygon points="250,170  271,159  370,170" fill="url(#ptDark)"/>
    <polygon points="250,170  271,181  370,170" fill="url(#ptMid)"/>
    <!-- WEST -->
    <polygon points="250,170  229,159  130,170" fill="url(#ptMid)"/>
    <polygon points="250,170  229,181  130,170" fill="url(#ptLight)"/>
    <!-- NE -->
    <polygon points="250,170  257,147  305,115" fill="url(#ptDark)"/>
    <polygon points="250,170  273,163  305,115" fill="url(#ptMid)"/>
    <!-- SE -->
    <polygon points="250,170  273,177  305,225" fill="url(#ptMid)"/>
    <polygon points="250,170  257,193  305,225" fill="url(#ptLight)"/>
    <!-- SW -->
    <polygon points="250,170  243,193  195,225" fill="url(#ptDark)"/>
    <polygon points="250,170  227,177  195,225" fill="url(#ptMid)"/>
    <!-- NW -->
    <polygon points="250,170  227,163  195,115" fill="url(#ptLightNW)"/>
    <polygon points="250,170  243,147  195,115" fill="url(#ptLight)"/>
    <!-- Glass disc -->
    <circle cx="250" cy="170" r="40" fill="none" stroke="#06111f"       stroke-width="1.2" opacity="0.28"/>
    <circle cx="250" cy="170" r="37" fill="none" stroke="url(#rimGrad)" stroke-width="2.5" opacity="0.95"/>
    <circle cx="250" cy="170" r="35" fill="url(#glassFill)"/>
    <circle cx="250" cy="170" r="35" fill="url(#skyBand)"/>
    <circle cx="250" cy="170" r="35" fill="url(#transmission)"/>
    <ellipse cx="235" cy="155" rx="22" ry="15"
             fill="url(#specMain)" transform="rotate(-22,235,155)"/>
    <ellipse cx="227" cy="149" rx="5" ry="3.5" fill="url(#specHot)" opacity="0.90"/>
    <!-- W monogram -->
    <g transform="translate(250,171)" filter="url(#wGlow)">
      <path d="M-17,-8 Q-20,3 -13,11 Q-9,15 -7,9 Q-4,4 0,12 Q4,4 7,9 Q9,15 13,11 Q20,3 17,-8"
            fill="none" stroke="#06111f" stroke-width="4.5"
            stroke-linejoin="round" stroke-linecap="round"
            opacity="0.40" transform="translate(1,1.2)"/>
      <path d="M-17,-8 Q-20,3 -13,11 Q-9,15 -7,9 Q-4,4 0,12 Q4,4 7,9 Q9,15 13,11 Q20,3 17,-8"
            fill="none" stroke="#0d2d6e" stroke-width="3.6"
            stroke-linejoin="round" stroke-linecap="round"/>
      <path d="M-17,-8 Q-20,3 -13,11 Q-9,15 -7,9 Q-4,4 0,12 Q4,4 7,9 Q9,15 13,11 Q20,3 17,-8"
            fill="none" stroke="#ffffff" stroke-width="1.4"
            stroke-linejoin="round" stroke-linecap="round" opacity="0.82"/>
      <circle cx="0" cy="-15" r="2.5" fill="#0d2d6e"/>
      <circle cx="0" cy="-15" r="1.2" fill="#7ab8e8"/>
      <line x1="-17" y1="-8" x2="-14" y2="-11" stroke="#0d2d6e" stroke-width="2"   stroke-linecap="round"/>
      <line x1="-17" y1="-8" x2="-14" y2="-11" stroke="#ffffff" stroke-width="0.8" stroke-linecap="round" opacity="0.7"/>
      <line x1="17"  y1="-8" x2="14"  y2="-11" stroke="#0d2d6e" stroke-width="2"   stroke-linecap="round"/>
      <line x1="17"  y1="-8" x2="14"  y2="-11" stroke="#ffffff" stroke-width="0.8" stroke-linecap="round" opacity="0.7"/>
    </g>
  </g>
</svg>
