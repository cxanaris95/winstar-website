<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Winstar Glass &amp; Hardware – Windows</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg?v=3">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="styles.css?v=20">
  <style>
    .back-link { display:inline-flex; align-items:center; gap:8px; color:var(--blue); font-size:14px; font-weight:600; letter-spacing:0.06em; text-decoration:none; margin-bottom:32px; transition:color 0.2s; }
    .back-link:hover { color:var(--navy); }
    .back-link::before { content:'\2190'; font-size:18px; }
    .gallery-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:14px; }
    .gallery-thumb { width:100%; aspect-ratio:4/3; object-fit:cover; border-radius:8px; cursor:pointer; display:block; transition:transform 0.2s,box-shadow 0.2s; }
    .gallery-thumb:hover { transform:scale(1.03); box-shadow:0 8px 28px rgba(0,0,0,0.22); }
    .lightbox { display:none; position:fixed; inset:0; z-index:9999; background:rgba(0,0,0,0.88); align-items:center; justify-content:center; }
    .lightbox.open { display:flex; }
    #lb-img { max-width:88vw; max-height:84vh; border-radius:6px; box-shadow:0 16px 60px rgba(0,0,0,0.6); display:block; }
    .lb-close { position:fixed; top:20px; right:28px; background:none; border:none; color:#fff; font-size:42px; line-height:1; cursor:pointer; opacity:0.8; transition:opacity 0.2s; z-index:10000; }
    .lb-close:hover { opacity:1; }
    .lb-arrow { position:fixed; top:50%; transform:translateY(-50%); background:rgba(255,255,255,0.12); border:none; color:#fff; font-size:32px; padding:14px 18px; cursor:pointer; border-radius:6px; transition:background 0.2s; z-index:10000; }
    .lb-arrow:hover { background:rgba(255,255,255,0.25); }
    .lb-prev { left:16px; }
    .lb-next { right:16px; }
    .lb-counter { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); color:rgba(255,255,255,0.6); font-size:13px; letter-spacing:0.08em; }
  </style>
</head>
<body class="has-banner">

  <header>
    <div class="header-inner">
      <div class="header-brand">
        <a href="index.html">
          <img src="winstar-logo3.png" alt="Winstar Glass &amp; Hardware" class="header-logo">
        </a>
      </div>
      <nav class="global-nav">
        <input type="checkbox" id="nav-toggle" class="nav-toggle" aria-hidden="true">
        <label for="nav-toggle" class="nav-toggle-label" aria-label="Toggle menu">
          <span></span><span></span><span></span>
        </label>
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="products.html">Products</a></li>
          <li><a href="services.html">Services</a></li>
          <li><a href="portfolio.html" class="active">Portfolio</a></li>
          <li><a href="contact.html">Contact</a></li>
          <li><a href="get-quote.html" class="nav-cta">Get a Quote</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <div class="page-content">
    <div class="page-banner">
      <div class="page-banner-bg" data-parallax="0.2" style="background-image: url('homebackground.jpg');"></div>
      <div class="page-banner-overlay"></div>
      <div class="page-banner-content">
        <h1>Windows</h1>
        <p>Residential and commercial window projects</p>
      </div>
    </div>

    <section class="section">
      <div class="section-inner">
        <a href="portfolio.html" class="back-link">Back to Portfolio</a>
        <h2 class="section-title reveal">Past Window Projects</h2>
        <div class="divider reveal"></div>

        <div class="gallery-grid">
          <img src="Pictures/Windows/1743.JPG" class="gallery-thumb reveal" alt="Window" data-src="Pictures/Windows/1743.JPG">
          <img src="Pictures/Windows/1744.JPG" class="gallery-thumb reveal" alt="Window" data-src="Pictures/Windows/1744.JPG">
          <img src="Pictures/Windows/1745.JPG" class="gallery-thumb reveal" alt="Window" data-src="Pictures/Windows/1745.JPG">
          <img src="Pictures/Windows/20171025_105801.jpg" class="gallery-thumb reveal" alt="Window" data-src="Pictures/Windows/20171025_105801.jpg">
          <img src="Pictures/Windows/20171025_105822.jpg" class="gallery-thumb reveal" alt="Window" data-src="Pictures/Windows/20171025_105822.jpg">
          <img src="Pictures/Windows/curvedpw.jpeg" class="gallery-thumb reveal" alt="Window" data-src="Pictures/Windows/curvedpw.jpeg">
          <img src="Pictures/Windows/tiltandturn.jpeg" class="gallery-thumb reveal" alt="Window" data-src="Pictures/Windows/tiltandturn.jpeg">
        </div>
      </div>
    </section>

    <footer>
      <p>&copy; 2024 Winstar Glass &amp; Windows &nbsp;|&nbsp; 131-22 Avery Avenue, Flushing, NY 11355 &nbsp;|&nbsp; <a href="contact.html">Contact Us</a></p>
    </footer>
  </div>

  <div id="lightbox" class="lightbox">
    <button class="lb-close" id="lb-close">&times;</button>
    <button class="lb-arrow lb-prev" id="lb-prev">&#10094;</button>
    <img id="lb-img" src="" alt="">
    <button class="lb-arrow lb-next" id="lb-next">&#10095;</button>
    <div class="lb-counter" id="lb-counter"></div>
  </div>

  <script>
    const revealEls = document.querySelectorAll('.reveal');
    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); } });
    }, { threshold: 0.08 });
    revealEls.forEach(el => obs.observe(el));

    const thumbs = Array.from(document.querySelectorAll('.gallery-thumb'));
    const lightbox = document.getElementById('lightbox');
    const lbImg = document.getElementById('lb-img');
    const lbCounter = document.getElementById('lb-counter');
    let cur = 0;

    function show(i) { cur = i; lbImg.src = thumbs[cur].dataset.src; lbImg.alt = thumbs[cur].alt; lbCounter.textContent = (cur + 1) + ' / ' + thumbs.length; }
    function open(i) { show(i); lightbox.classList.add('open'); document.body.style.overflow = 'hidden'; }
    function close() { lightbox.classList.remove('open'); document.body.style.overflow = ''; lbImg.src = ''; }

    thumbs.forEach((img, i) => img.addEventListener('click', () => open(i)));
    document.getElementById('lb-close').addEventListener('click', close);
    document.getElementById('lb-prev').addEventListener('click', e => { e.stopPropagation(); show((cur - 1 + thumbs.length) % thumbs.length); });
    document.getElementById('lb-next').addEventListener('click', e => { e.stopPropagation(); show((cur + 1) % thumbs.length); });
    lightbox.addEventListener('click', e => { if (e.target === lightbox) close(); });
    document.addEventListener('keydown', e => {
      if (!lightbox.classList.contains('open')) return;
      if (e.key === 'Escape') close();
      if (e.key === 'ArrowLeft') show((cur - 1 + thumbs.length) % thumbs.length);
      if (e.key === 'ArrowRight') show((cur + 1) % thumbs.length);
    });
  </script>
  <script src="main.js?v=13"></script>
</body>
</html>
